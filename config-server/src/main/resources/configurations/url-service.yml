server:
    port: 8101

spring:
    datasource:
        url: jdbc:mysql://localhost:3306/url_service
        username: root
        password: alone_Hacker/1258
    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQLDialect
                format_sql: true
    data:
        redis:
            host: localhost
            port: 6379
            database: 0
            timeout: 2000ms

            lettuce:
                pool:
                    max-active: 20
                    max-idle: 8
                    min-idle: 2
                    max-wait: 1000ms
    kafka:
        consumer:
            key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
            bootstrap-servers: localhost:9092
            group-id: url-service-group
            auto-offset-reset: earliest
            enable-auto-commit: true
            properties:
                spring:
                    json:
                        trusted:
                            packages: "*"


eureka:
    client:
        service-url:
            defaultZone: http://localhost:8500/eureka/
    instance:
        prefer-ip-address: true

security:
    app:
        url:
            base-url: https://microurl.ly
        quota:
            free-tier-limit: 50
            premium-tier-limit: 500
        cache:
            url-ttl-minutes: 15